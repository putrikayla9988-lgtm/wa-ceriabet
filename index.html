<head>

<!-- ICON TAB -->

<link rel="shortcut icon" href="https://plcl.me/images/2jMp9.png">

<style>
*{box-sizing:border-box}

:root{
--gold:#ffd54f;
--purple:#2a0a4a;
--purple2:#4f1f7d;
--card:rgba(20,10,35,.82);
--line:rgba(255,255,255,.12);
--textsoft:rgba(255,255,255,.82);
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
background:
linear-gradient(rgba(20,10,35,.75),rgba(20,10,35,.9)),
url("https://plcl.me/images/wap3j.jpg") center/cover no-repeat fixed;
padding:20px 12px;
min-height:100vh;
}

.wrap{max-width:560px;margin:auto}

.card{
background:var(--card);
border:1px solid rgba(255,213,79,.15);
border-radius:22px;
padding:20px;
box-shadow:0 18px 45px rgba(0,0,0,.35);
backdrop-filter:blur(8px);
}

.top{text-align:center;margin-bottom:18px}

.logo{max-width:180px;margin:auto;display:block}

.title{font-size:26px;font-weight:800;margin:10px 0}

.title span{
background:linear-gradient(180deg,#fff2b0 0%,#ffd54f 45%,#b8860b 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{font-size:14px;color:var(--textsoft)}

.box{
background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:16px;
padding:16px;
margin-top:14px;
}

.section{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px}

.login{
display:block;
text-align:center;
padding:13px;
border-radius:12px;
background:linear-gradient(135deg,#7b2cbf,#ffd54f);
color:#fff;
font-weight:700;
text-decoration:none;
}

.banner{width:100%;border-radius:12px}

.form-group{margin-bottom:14px}

.label{font-weight:700;font-size:14px;margin-bottom:6px;display:block}

input,textarea{
width:100%;
padding:13px;
border-radius:12px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.06);
color:#fff;
}

textarea{min-height:95px}

.option-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option input{display:none}

.option label{
display:block;
padding:12px;
text-align:center;
border-radius:12px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
font-weight:700;
}

.option input:checked+label{
background:linear-gradient(135deg,#7b2cbf,#ffd54f);
color:#fff;
border-color:#ffd54f;
}

.action{margin-top:18px}

.wa{
width:100%;
border:none;
border-radius:14px;
padding:15px;
font-size:15px;
font-weight:800;
background:linear-gradient(135deg,#25d366,#1ea851);
color:#fff;
cursor:pointer;
}

.error{font-size:12px;color:#ff9c9c;display:none;margin-top:5px}

@media(max-width:520px){
.option-grid{grid-template-columns:1fr}
.title{font-size:22px}
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="top">
<img class="logo"
src="https://plcl.me/images/7XJ4J.gif">
<h1 class="title">Pelayanan <span>Resmi CERIABET</span></h1>
<p class="desc">Isi data Anda dengan benar agar tim kami dapat membantu lebih cepat.</p>
</div>

<div class="box">
<div class="section">LINK LOGIN RESMI</div>
<a class="login" href="https://access.vpnceria.life/ceriabet-login" target="_blank">
Klik di sini untuk login CERIABET
</a>
</div>

<div class="box">
<img class="banner"
src="https://plcl.me/images/eN7Uw.png">
</div>

<div class="box">
<div class="section">FORM BANTUAN MEMBER</div>

<div class="form-group">
<label class="label">User ID</label>
<input type="text" id="userId" placeholder="Masukkan User ID Anda">
<div class="error" id="userErr">User ID wajib diisi</div>
</div>

<div class="form-group">
<label class="label">Pilih Kendala</label>
<div class="option-grid">
<div class="option"><input type="checkbox" id="d" value="Deposit"><label for="d">Deposit</label></div>
<div class="option"><input type="checkbox" id="w" value="Withdraw"><label for="w">Withdraw</label></div>
<div class="option"><input type="checkbox" id="l" value="Lupa Password"><label for="l">Lupa Password</label></div>
<div class="option"><input type="checkbox" id="k" value="Keluhan Lainnya"><label for="k">Keluhan Lainnya</label></div>
</div>
<div class="error" id="kelErr">Pilih minimal 1 kendala</div>
</div>

<div class="form-group">
<label class="label">Detail Kendala</label>
<textarea id="detail" placeholder="Tuliskan kendala Anda"></textarea>
</div>

<div class="action">
<button class="wa" id="send">Kirim ke WhatsApp</button>
</div>

</div>
</div>
</div>

<script>
const WA="12249553370"
const LOGIN="https://access.vpnceria.life/ceriabet-login"

document.getElementById("send").onclick=function(){

const id=document.getElementById("userId").value.trim()
const detail=document.getElementById("detail").value.trim()
const cek=[...document.querySelectorAll('.option input:checked')].map(e=>e.value)

document.getElementById("userErr").style.display=id?"none":"block"
document.getElementById("kelErr").style.display=cek.length?"none":"block"

if(!id||!cek.length)return

const msg=`Halo Admin CERIABET 👋

User ID: ${id}
Kendala: ${cek.join(", ")}
Detail: ${detail||"-"}

Link Login:
${LOGIN}

Mohon dibantu ya kak 🙏`

location.href=`https://api.whatsapp.com/send?phone=${WA}&text=${encodeURIComponent(msg)}`
}
</script>

</body>
</html>
